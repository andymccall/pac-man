# Dependabot — automatic GitHub Actions version updates (#8).
#
# Weekly check of all `uses:` references in .github/workflows/*.yml.
# Opens a PR when an action has a newer version; CI's lint + build
# jobs run on the PR so we can see if anything breaks before merging.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
