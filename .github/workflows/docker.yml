# GitHub Actions workflow: build + publish the toolchain Docker image
# (#8) to GitHub Container Registry. The build workflow does NOT depend
# on this one — it builds the same image inline — but `docker.yml`
# makes the image available off-CI for devcontainers, downstream
# forks, manual `docker pull`, etc.
#
# Triggers:
#   - push to main when the Dockerfile (or this workflow) changes
#   - manual workflow_dispatch (for force-rebuilds without touching code)
#
# The image is tagged BOTH `:latest` (rolling) AND `:sha-<short>` so a
# CI run can reference an immutable image even if `latest` rolls
# forward mid-flight.

name: 🐳 Publish toolchain image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

# Avoid concurrent publishes stomping on `latest`. Newer pushes
# cancel in-flight runs.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

# Image lives at ghcr.io/<owner>/<repo>-builder. The `<repo>-builder`
# suffix keeps it disambiguated from any future image we might publish.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-builder
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: 📤 Build & publish to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write    # required to push to ghcr.io for this repo

    steps:
      - name: 📦 Checkout source
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️  Compute image tags
        id: tags
        run: |
          # Lowercase the image name (ghcr requirement) and emit two
          # tags: rolling :latest + immutable :sha-<7-char>.
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          {
            echo "image=${IMAGE}"
            echo "sha_short=${SHA_SHORT}"
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:sha-${SHA_SHORT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🔨 Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Layer cache lives in the GitHub Actions cache scope — keeps
          # subsequent builds fast even though we don't keep a long-lived
          # buildkit daemon.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # OCI labels also live in the Dockerfile, but pinning the
          # source ref + the workflow run lets the GHCR package page
          # link straight back to the build that produced the image.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: 📝 Post publish summary
        run: |
          {
            echo "## 🐳 Image published"
            echo ""
            echo "Tags pushed to GHCR:"
            echo ""
            echo "- \`${{ steps.tags.outputs.image }}:latest\`"
            echo "- \`${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.sha_short }}\`"
            echo ""
            echo "Pull with:"
            echo ""
            echo '```sh'
            echo "docker pull ${{ steps.tags.outputs.image }}:latest"
            echo '```'
            echo ""
            echo "_Note: \`build.yml\` doesn't pull this image — it builds the toolchain inline, sharing the GHA layer cache. This image is for off-CI consumers (devcontainers, downstream forks)._"
          } >> "$GITHUB_STEP_SUMMARY"
